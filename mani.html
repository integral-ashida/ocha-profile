<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲンゴロウ | Specimen</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/data.css">
</head>

<body class="specimen">

<!-- ナビ -->
<nav class="nav">
    <a href="index.html" class="nav-item">TOP</a>
    <a href="db.html" class="nav-item">BACK</a>
</nav>

<!-- HERO（標本ラベル） -->
<header class="specimen-hero">
    <div class="label-box">
        <p class="family">DYTISCIDAE</p>
        <h1>ゲンゴロウ</h1>
        <p class="latin">Dytiscus sharpi</p>
    </div>
</header>

<main>

<!-- 観察ウィンドウ（写真主役） -->
<section class="window">

    <div class="glass">
        <img src="images/db.jpeg">
    </div>

    <div class="film-strip">
        <img src="images/db.jpeg">
        <img src="images/db2.jpeg">
        <img src="images/db3.jpeg">
    </div>

</section>

<!-- ステータス（ラベル風） -->
<section class="labels">

    <div class="label">
        <span>STATUS</span>
        <p>指定なし</p>
    </div>

    <div class="label">
        <span>SIZE</span>
        <p>30–38 mm</p>
    </div>

    <div class="label">
        <span>HABITAT</span>
        <p>田んぼ・止水域</p>
    </div>

</section>

<!-- 分布（地図UI） -->
<section class="map">
    <h2>Distribution Map</h2>
    <div class="map-frame">
        日本地図SVG（後で色付け）
    </div>
</section>

<!-- 記録 -->
<section class="log">
    <h2>Field Records</h2>

    <div class="entry">2024 / Hiroshima / Night sampling</div>
    <div class="entry">水田環境で確認</div>
    <div class="entry">飛翔音あり</div>

</section>

</main>

</body>
</html>
