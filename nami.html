<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本の主なゲンゴロウ</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/data.css">
</head>

<script>
    function changePhoto(src) {
    document.getElementById("main-photo").src = src;
}
</script>
    
<body class="data">

<nav class="nav">
    <a href="index.html" class="nav-item">TOP</a>
    <a href="quiz.html" class="nav-item">競技クイズ</a>
    <a href="pk.html" class="nav-item">ポケモン</a>
    <a href="db.html" class="nav-item">水生昆虫</a>
</nav>

<main class="container">

    <!-- ヘッダー -->
    <header class="species-header">
    <h1>ゲンゴロウ</h1>
    <p class="latin"><em>Cybister chinensis</em></p>
</header>

    <!-- メインビジュアル -->
   <!-- メインビジュアル -->
<section class="gallery">

    <img
        id="main-photo"
        class="main-photo"
        src="images/nami_1.jpeg"
        alt="ゲンゴロウ">

    <div class="thumbs">

        <img src="images/nami_1.jpeg"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_2.heic"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_3.heic"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_4.heic"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_5.heic"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_6.heic"
         onmouseover="changePhoto(this.src)">
        <img src="images/nami_10.heic"
         onmouseover="changePhoto(this.src)">

    </div>

</section>

    <!-- 情報カード -->
    <section class="info-grid">

        <div class="info-card">
            <h3>分類</h3>
            <p>ゲンゴロウ科</p>
        </div>

        <div class="info-card">
            <h3>環境省カテゴリー</h3>
            <p class="rank-vu">絶滅危惧種Ⅱ類（UV）</p>
        </div>

        <div class="info-card">
            <h3>大きさ</h3>
            <p>34〜43mm</p>
        </div>

    </section>

    <!-- 説明 -->
    <section class="description">
        <h2>説明</h2>
        <p>
        日本最大のゲンゴロウ。ナミゲンゴロウと呼ばれることも多く、一般的にゲンゴロウと聞いてイメージするのは本種。
        </p>
    </section>

    <!-- 地図 -->
    <section class="map">
        <h2>分布</h2>
        <div class="map-box">
            日本地図（都道府県ハイライト予定）
        </div>
    </section>

</main>

<script>
function changePhoto(src) {
    document.getElementById("main-photo").src = src;
}
</script>

</body>
</html>
